<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: transparent;
    font-family: Segoe UI, Arial, sans-serif;
}

:root {
    --accent: #00E5FF;
    --bg1: #1f2228;
    --bg2: #0b0c0f;
    --text: #ffffff;
}

#bar {
    position: fixed;
    left: 0;
    bottom: 0;

    width: 100vw;

    height: clamp(48px, 4vh, 80px);

    display: flex;
    align-items: center;

    overflow: hidden;

    background: linear-gradient(180deg, var(--bg1), var(--bg2));
    border-top: max(2px, 0.2vw) solid var(--accent);

    box-shadow:
        0 -6px 24px rgba(0,0,0,.45),
        inset 0 1px rgba(255,255,255,.08);
}

#track {
    display: flex;
    align-items: center;
    white-space: nowrap;
    will-change: transform;
}

.item {
    display: flex;
    align-items: center;

    font-size: clamp(20px, 1.6vw, 40px);
    font-weight: 800;

    color: var(--text);
    letter-spacing: 0.5px;

    margin-right: clamp(40px, 3vw, 90px);

    text-shadow: 0 2px 5px rgba(0,0,0,.6);
}

.dot {
    color: var(--accent);
    margin: 0 14px;
}

.highlight {
    color: var(--accent);
}
</style>
</head>

<body>

<div id="bar">
    <div id="track"></div>
</div>

<script>
const p = new URLSearchParams(location.search);

const SPEED = Number(p.get("speed")) || 80;
const ACCENT = p.get("accent") || "#00E5FF";
const BG1 = p.get("bg1") || "#1f2228";
const BG2 = p.get("bg2") || "#0b0c0f";

document.documentElement.style.setProperty("--accent", ACCENT);
document.documentElement.style.setProperty("--bg1", BG1);
document.documentElement.style.setProperty("--bg2", BG2);

const defaultMessage = `
<span class="item">
<span class="highlight">FOLLOW @klkgennn on X, IG, TikTok</span>
<span class="dot">●</span>
NEW VIDEOS EVERY WEEK
<span class="dot">●</span>
TYPE /menu /menus
<span class="dot">●</span>
NEXT GOAL: 100,000 FOLLOWERS
<span class="dot">●</span>
THANKS FOR WATCHING
</span>
`;

const html = p.get("text") || defaultMessage;

const track = document.getElementById("track");

track.innerHTML = html;

let x = 0;
let last = performance.now();
let contentWidth = 0;

// measure real width after render
function measure() {
    contentWidth = track.offsetWidth;
}

// clone content until it's wider than screen (guarantees full coverage)
function fillTrack() {
    const screenWidth = window.innerWidth;
    while (track.offsetWidth < screenWidth * 2) {
        track.innerHTML += html;
    }
}

function reset() {
    track.innerHTML = html;
    fillTrack();
    measure();
    x = 0;
}

function loop(now) {
    const dt = (now - last) / 1000;
    last = now;

    x -= SPEED * dt;

    if (Math.abs(x) >= contentWidth / 2) {
        x = 0;
    }

    track.style.transform = `translate3d(${x}px,0,0)`;

    requestAnimationFrame(loop);
}

window.addEventListener("resize", reset);
window.addEventListener("orientationchange", reset);

reset();
requestAnimationFrame(loop);
</script>

</body>
</html>

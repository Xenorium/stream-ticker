<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
html, body {
  margin: 0;
  overflow: hidden;
  background: transparent;
}

.ticker-wrap {
  width: 100vw;
  overflow: hidden;
  white-space: nowrap;
}

.ticker {
  display: inline-block;
  padding-left: 100%;
  animation: scroll 20s linear infinite;
  font-family: Arial, sans-serif;
  font-size: 42px;
  color: white;
  font-weight: bold;
}

@keyframes scroll {
  from { transform: translateX(0); }
  to { transform: translateX(-100%); }
}
</style>
</head>
<body>
<div class="ticker-wrap">
  <div class="ticker">
    🔥 LIVE NOW • Follow for more • !discord • New videos every week • 🔥 LIVE NOW • Follow for more • !discord • New videos every week •
  </div>
</div>
</body>
</html>

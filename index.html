<!DOCTYPE html>
<html>
<body style="margin:0;background:black;">
<div id="box" style="width:100px;height:40px;background:red;position:absolute;"></div>

<script>
let x = 0;

setInterval(() => {
    x++;
    document.getElementById("box").style.left = x + "px";
}, 16);
</script>

</body>
</html>

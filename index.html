<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

html,body{
    margin:0;
    width:3840px;
    height:2160px;
    overflow:hidden;
    background:transparent;
    font-family:Segoe UI,Arial,sans-serif;
}

:root{
    --accent:#00E5FF;
    --bg1:#1f2228;
    --bg2:#0b0c0f;
    --text:#ffffff;
}

#bar{
    position:absolute;
    left:0;
    right:0;
    bottom:0;

    width:2868px;
    height:64px;

    overflow:hidden;

    background:
        linear-gradient(180deg,var(--bg1),var(--bg2));

    border-top:4px solid var(--accent);

    box-shadow:
        0 -6px 24px rgba(0,0,0,.45),
        inset 0 1px rgba(255,255,255,.08);
}

#viewport{
    width:100%;
    height:100%;
    overflow:hidden;
    position:relative;
}

#track{
    position:absolute;
    left:0;
    top:50%;

    display:flex;
    align-items:center;

    transform:translate3d(0,-50%,0);

    will-change:transform;
}
.strip{

    display:flex;
    flex-shrink:0;

}

.item{

    display:flex;
    align-items:center;

    color:var(--text);

    font-size:38px;
    font-weight:800;

    letter-spacing:.6px;

    margin-right:70px;

    text-shadow:
        0 2px 5px rgba(0,0,0,.6);

}

.dot{

    color:var(--accent);

    margin:0 18px;

    font-size:22px;

}

.highlight{

    color:var(--accent);

}

</style>

</head>

<body>

<div id="bar">

    <div id="viewport">
        <div id="track"></div>
    </div>

</div>

</body>
    
<script>

const p=new URLSearchParams(location.search);

const SPEED=Number(p.get("speed"))||60; // pixels/sec

const ACCENT=p.get("accent")||"#00E5FF";
const BG1=p.get("bg1")||"#1f2228";
const BG2=p.get("bg2")||"#0b0c0f";

document.documentElement.style.setProperty("--accent",ACCENT);
document.documentElement.style.setProperty("--bg1",BG1);
document.documentElement.style.setProperty("--bg2",BG2);

const defaultMessage=`
<div class="item">
<span class="highlight">FOLLOW @klkgennn on X, IG, TikTok</span>
<span class="dot">●</span>
CONTROL ME 🎮🍑💦🫦 ( 121 TOKENS TO SLIP TOY INSIDE AND START THE SHOW )
<span class="dot">●</span>
NEW VIDEOS EVERY WEEK
<span class="dot">●</span>
TYPE /menus /menu 1 /menu2 /menu3
<span class="dot">●</span>
NEXT GOAL: 100,000 FOLLOWERS
<span class="dot">●</span>
CATCH ME ON SNAP AND OF 😈
<span class="dot">●</span>
THANKS FOR WATCHING
</div>
`;

const html=p.get("text")||defaultMessage;

const track=document.getElementById("track");

function makeStrip(){

    const s=document.createElement("div");
    s.className="strip";

    for(let i=0;i<6;i++)
        s.innerHTML+=html;

    return s;

}

track.appendChild(makeStrip());
track.appendChild(makeStrip());

let x=0;
let last=performance.now();

function loop(now){

    const dt=(now-last)/1000;
    last=now;

    x-=SPEED*dt;

    const first=track.firstElementChild;

    if(-x>=first.offsetWidth){

        x+=first.offsetWidth;

        track.appendChild(first);

    }

    track.style.transform=
        `translate3d(${x}px,-50%,0)`;

    requestAnimationFrame(loop);

}

requestAnimationFrame(loop);

</script>

</body>
</html>

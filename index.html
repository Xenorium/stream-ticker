<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
    margin: 0;
    overflow: hidden;
    background: transparent;
    width: 100%;
    height: 100%;
}

#viewport {
    width: 100vw;
    overflow: hidden;
    white-space: nowrap;
    position: relative;
}

#track {
    display: inline-flex;
    position: relative;
    left: 0;
}

.item {
    display: inline-block;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 42px;
    font-weight: bold;
    color: white;
    padding-right: 80px;
    user-select: none;
}
</style>
</head>

<body>

<div id="viewport">
    <div id="track"></div>
</div>

<script>
const params = new URLSearchParams(location.search);

const message =
    params.get("text") ||
    "🔥 LIVE NOW • Follow @YourName • !discord • Thanks for watching • ";

const track = document.getElementById("track");

// Duplicate enough times to completely fill the screen
for (let i = 0; i < 20; i++) {
    const span = document.createElement("span");
    span.className = "item";
    span.textContent = message;
    track.appendChild(span);
}

let x = 0;
const speed = 1.2; // pixels per frame

function animate() {

    x -= speed;

    const first = track.firstElementChild;

    if (first.getBoundingClientRect().right < 0) {
        x += first.offsetWidth;
        track.appendChild(first);
    }

    track.style.transform = `translateX(${x}px)`;

    requestAnimationFrame(animate);
}

requestAnimationFrame(animate);
</script>

</body>
</html>

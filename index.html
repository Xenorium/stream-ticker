<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Canvas Ticker v3</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: transparent;
}
canvas {
    display: block;
}
</style>
</head>

<body>

<canvas id="ticker"></canvas>

<script>
const p = new URLSearchParams(location.search);

const SPEED = Number(p.get("speed")) || 180; // px/sec
const ACCENT = p.get("accent") || "#00E5FF";
const BG1 = p.get("bg1") || "#1f2228";
const BG2 = p.get("bg2") || "#0b0c0f";

const canvas = document.getElementById("ticker");
const ctx = canvas.getContext("2d");

let W = 0, H = 0, DPR = 1;

function resize() {
    DPR = Math.max(1, window.devicePixelRatio || 1);
    W = window.innerWidth;
    H = window.innerHeight;

    canvas.width = W * DPR;
    canvas.height = H * DPR;
    canvas.style.width = W + "px";
    canvas.style.height = H + "px";

    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener("resize", resize);
resize();

// TEXT
const defaultText =
"FOLLOW @klkgennn • NEW VIDEOS WEEKLY • TYPE /menu • NEXT GOAL: 100K FOLLOWERS • THANK YOU FOR WATCHING";

const text = p.get("text") || defaultText;

const fontSize = () => Math.max(18, W * 0.03);
let x = 0;

function drawBackground() {
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, BG1);
    grad.addColorStop(1, BG2);

    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // top accent line
    ctx.fillStyle = ACCENT;
    ctx.fillRect(0, 0, W, Math.max(2, W * 0.002));
}

function drawTextLoop(y, xPos) {
    ctx.font = `800 ${fontSize()}px Segoe UI, Arial`;
    ctx.fillStyle = "#ffffff";
    ctx.textBaseline = "middle";

    const spacing = fontSize() * 1.2;
    const fullText = text + "   •   ";

    let offsetX = xPos;

    // draw enough copies to fill screen
    while (offsetX < W + 500) {
        ctx.fillText(fullText, offsetX, y);
        offsetX += ctx.measureText(fullText).width + spacing;
    }

    return ctx.measureText(fullText).width + spacing;
}

let last = performance.now();

function loop(now) {
    const dt = (now - last) / 1000;
    last = now;

    drawBackground();

    const y = H / 2;

    const step = drawTextLoop(y, x);

    x -= SPEED * dt;

    if (Math.abs(x) > step) {
        x = 0;
    }

    requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

html,body{
    margin:0;
    overflow:hidden;
    background:transparent;
    font-family:Segoe UI,Arial,sans-serif;
}

:root{
    --accent:#00E5FF;
    --bg1:#1f2228;
    --bg2:#0b0c0f;
    --text:#ffffff;
}

/* BAR */
#bar{
    position:absolute;
    left:0;
    right:0;
    bottom:0;

    height:74px;

    overflow:hidden;

    background:
        linear-gradient(180deg,var(--bg1),var(--bg2));

    border-top:4px solid var(--accent);

    box-shadow:
        0 -6px 24px rgba(0,0,0,.45),
        inset 0 1px rgba(255,255,255,.08);
}

/* VIEWPORT */
#viewport{
    width:100%;
    height:100%;
    overflow:hidden;
    position:relative;
}

/* TRACK */
#track{
    position:absolute;
    left:0;
    top:50%;

    display:flex;
    align-items:center;

    transform:translate3d(0,-50%,0);

    will-change:transform;
}

/* STRIP */
.strip{
    display:flex;
    flex-shrink:0;
}

/* TEXT ITEMS */
.item{
    display:flex;
    align-items:center;

    color:var(--text);

    font-size:34px;
    font-weight:800;

    letter-spacing:.6px;

    margin-right:70px;

    text-shadow:
        0 2px 5px rgba(0,0,0,.6);
}

/* DOT SEPARATORS */
.dot{
    color:var(--accent);
    margin:0 18px;
    font-size:22px;
}

/* HIGHLIGHT TEXT */
.highlight{
    color:var(--accent);
}

</style>
</head>

<body>

<div id="bar">
    <div id="viewport">
        <div id="track"></div>
    </div>
</div>

<script>

const p = new URLSearchParams(location.search);

const SPEED = Number(p.get("speed")) || 110; // pixels per second

const ACCENT = p.get("accent") || "#00E5FF";
const BG1 = p.get("bg1") || "#1f2228";
const BG2 = p.get("bg2") || "#0b0c0f";

document.documentElement.style.setProperty("--accent", ACCENT);
document.documentElement.style.setProperty("--bg1", BG1);
document.documentElement.style.setProperty("--bg2", BG2);

/* DEFAULT MESSAGE */
const message = `
<span class="highlight">FOLLOW @YOURNAME</span>
<span class="dot">●</span>
NEW VIDEOS EVERY WEEK
<span class="dot">●</span>
TYPE !DISCORD
<span class="dot">●</span>
NEXT GOAL: 5,000 FOLLOWERS
<span class="dot">●</span>
THANK YOU FOR WATCHING
`;

/* TRACK */
const track = document.getElementById("track");

function createStrip(){
    const strip = document.createElement("div");
    strip.className = "strip";

    // repeat content to ensure full coverage
    strip.innerHTML = message.repeat(6);

    return strip;
}

/* Two strips for seamless looping */
track.appendChild(createStrip());
track.appendChild(createStrip());

let x = 0;
let last = performance.now();

function animate(now){

    const dt = (now - last) / 1000;
    last = now;

    x -= SPEED * dt;

    const first = track.firstElementChild;

    if (-x >= first.offsetWidth){
        x += first.offsetWidth;
        track.appendChild(first);
    }

    track.style.transform =
        `translate3d(${x}px,-50%,0)`;

    requestAnimationFrame(animate);
}

requestAnimationFrame(animate);

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

html,body{
    margin:0;
    overflow:hidden;
    background:transparent;
    font-family:Segoe UI,Arial,sans-serif;
}

:root{
    --accent:#00E5FF;
    --bg1:#1f2228;
    --bg2:#0b0c0f;
    --text:#ffffff;
}

#bar{

    position:absolute;
    left:0;
    right:0;
    bottom:0;

    height:74px;

    display:flex;

    background:
        linear-gradient(180deg,var(--bg1),var(--bg2));

    border-top:4px solid var(--accent);

    box-shadow:
        0 -6px 24px rgba(0,0,0,.45),
        inset 0 1px rgba(255,255,255,.08);

}

#live{

    width:160px;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:30px;
    font-weight:900;
    letter-spacing:2px;

    color:white;

    background:
        linear-gradient(135deg,#ff0040,#a00020);

    box-shadow:
        0 0 18px rgba(255,0,80,.45);

    flex-shrink:0;

}

#viewport{

    flex:1;
    overflow:hidden;
    position:relative;

}

#track{

    position:absolute;
    left:0;
    top:50%;

    display:flex;
    align-items:center;

    transform:translate3d(0,-50%,0);

    will-change:transform;

}

.strip{

    display:flex;
    flex-shrink:0;

}

.item{

    display:flex;
    align-items:center;

    color:var(--text);

    font-size:34px;
    font-weight:800;

    letter-spacing:.6px;

    margin-right:70px;

    text-shadow:
        0 2px 5px rgba(0,0,0,.6);

}

.dot{

    color:var(--accent);

    margin:0 18px;

    font-size:22px;

}

.highlight{

    color:var(--accent);

}

</style>

</head>

<body>

<div id="bar">

    <div id="live">
        LIVE
    </div>

    <div id="viewport">
        <div id="track"></div>
    </div>

</div>

<script>

const p=new URLSearchParams(location.search);

const SPEED=Number(p.get("speed"))||110; // pixels/sec

const ACCENT=p.get("accent")||"#00E5FF";
const BG1=p.get("bg1")||"#1f2228";
const BG2=p.get("bg2")||"#0b0c0f";

document.documentElement.style.setProperty("--accent",ACCENT);
document.documentElement.style.setProperty("--bg1",BG1);
document.documentElement.style.setProperty("--bg2",BG2);

const defaultMessage=`
<div class="item">
<span class="highlight">FOLLOW @YOURNAME</span>
<span class="dot">●</span>
NEW VIDEOS EVERY WEEK
<span class="dot">●</span>
TYPE !DISCORD
<span class="dot">●</span>
NEXT GOAL: 5,000 FOLLOWERS
<span class="dot">●</span>
THANKS FOR WATCHING
</div>
`;

const html=p.get("text")||defaultMessage;

const track=document.getElementById("track");

function makeStrip(){

    const s=document.createElement("div");
    s.className="strip";

    for(let i=0;i<6;i++)
        s.innerHTML+=html;

    return s;

}

track.appendChild(makeStrip());
track.appendChild(makeStrip());

let x=0;
let last=performance.now();

function loop(now){

    const dt=(now-last)/1000;
    last=now;

    x-=SPEED*dt;

    const first=track.firstElementChild;

    if(-x>=first.offsetWidth){

        x+=first.offsetWidth;

        track.appendChild(first);

    }

    track.style.transform=
        `translate3d(${x}px,-50%,0)`;

    requestAnimationFrame(loop);

}

requestAnimationFrame(loop);

</script>

</body>
</html>

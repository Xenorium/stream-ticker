<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
    margin:0;
    overflow:hidden;
    background:transparent;
}

#viewport{
    width:100vw;
    overflow:hidden;
    white-space:nowrap;
}

#ticker{
    display:inline-block;
    will-change:transform;
    font-family:Arial,Helvetica,sans-serif;
    font-size:42px;
    font-weight:bold;
    color:white;
}
</style>
</head>

<body>

<div id="viewport">
    <div id="ticker"></div>
</div>

<script>

const params = new URLSearchParams(location.search);

const text =
    params.get("text") ||
    "🔥 LIVE NOW • Follow • !discord • Subscribe • ";

const ticker = document.getElementById("ticker");

// Build one long string
let repeated = "";
for(let i=0;i<30;i++){
    repeated += text;
}

ticker.textContent = repeated;

// Wait for the browser to calculate the width
setTimeout(() => {

    // Width of ONE message
    const measure = document.createElement("span");
    measure.style.visibility = "hidden";
    measure.style.position = "absolute";
    measure.style.font = getComputedStyle(ticker).font;
    measure.textContent = text;
    document.body.appendChild(measure);

    const loopWidth = measure.offsetWidth;
    document.body.removeChild(measure);

    let x = 0;
    const speed = 2;

    setInterval(() => {

        x -= speed;

        if (-x >= loopWidth) {
            x = 0;
        }

        ticker.style.transform = `translateX(${x}px)`;

    },16);

},100);

</script>

</body>
</html>

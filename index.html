<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

html,body{
    margin:0;
    overflow:hidden;
    background:transparent;
}

:root{
    --barHeight:72px;
    --textColor:#ffffff;
    --accent:#00E5FF;
}

#bar{
    position:absolute;
    left:0;
    right:0;
    bottom:0;

    height:var(--barHeight);

    background:
        linear-gradient(180deg,
        rgba(40,40,45,.92),
        rgba(10,10,12,.96));

    border-top:4px solid var(--accent);

    box-shadow:
        0 -4px 20px rgba(0,0,0,.45),
        inset 0 1px rgba(255,255,255,.08);

    overflow:hidden;
}

#ticker{

    position:absolute;
    top:50%;
    transform:translateY(-50%);

    white-space:nowrap;

    font-family:
        "Segoe UI",
        Arial,
        sans-serif;

    font-size:34px;
    font-weight:800;
    letter-spacing:.8px;

    color:var(--textColor);

    text-shadow:
        0 0 6px rgba(255,255,255,.35),
        0 2px 6px rgba(0,0,0,.6);

    will-change:transform;

}

.live{

    color:var(--accent);

}

.dot{

    color:#666;
    padding:0 18px;

}

</style>
</head>

<body>

<div id="bar">
    <div id="ticker"></div>
</div>

<script>

const params = new URLSearchParams(location.search);

const speed = Number(params.get("speed")) || 2;

const accent = params.get("accent") || "#00E5FF";

document.documentElement.style.setProperty("--accent",accent);

const message = params.get("text") ||

"<span class='live'>LIVE</span><span class='dot'>●</span>FOLLOW @YOURNAME<span class='dot'>●</span>NEW VIDEOS EVERY WEEK<span class='dot'>●</span>TYPE !DISCORD<span class='dot'>●</span>";

const ticker=document.getElementById("ticker");

let html="";

for(let i=0;i<30;i++)
    html+=message;

ticker.innerHTML=html;

setTimeout(()=>{

    const measure=document.createElement("div");

    measure.style.position="absolute";
    measure.style.visibility="hidden";
    measure.innerHTML=message;

    measure.style.font=ticker.style.font;

    document.body.appendChild(measure);

    const loopWidth=measure.offsetWidth;

    measure.remove();

    let x=0;

    setInterval(()=>{

        x-=speed;

        if(-x>=loopWidth)
            x=0;

        ticker.style.transform=
            `translate(${x}px,-50%)`;

    },16);

},100);

</script>

</body>
</html>
